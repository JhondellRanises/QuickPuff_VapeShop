<!DOCTYPE html>
<html>
<head>
    <title>Debug Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Debug Product Form</h2>
        <form action="<?= site_url('/products/store') ?>" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="<?= csrf_token() ?>" value="<?= csrf_hash() ?>">
            
            <div class="mb-3">
                <label for="name" class="form-label">Product Name *</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>
            
            <div class="mb-3">
                <label for="category" class="form-label">Category *</label>
                <input type="text" class="form-control" id="category" name="category" required>
            </div>
            
            <div class="mb-3">
                <label for="price" class="form-label">Price *</label>
                <input type="number" class="form-control" id="price" name="price" step="0.01" min="0" required>
            </div>
            
            <div class="mb-3">
                <label for="stock_qty" class="form-label">Stock Quantity *</label>
                <input type="number" class="form-control" id="stock_qty" name="stock_qty" min="0" required>
            </div>
            
            <div class="mb-3">
                <label for="is_active" class="form-label">Status *</label>
                <select class="form-select" id="is_active" name="is_active" required>
                    <option value="1">Active</option>
                    <option value="0">Inactive</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary">Save Product</button>
        </form>
    </div>
</body>
</html>
